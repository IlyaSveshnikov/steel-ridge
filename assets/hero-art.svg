<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440" width="620" height="440" fill="none" role="img" aria-label="Схема стропильной фермы крыши">
  <style>
    .l { fill:none; stroke:#f07020; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; }
    .f { fill:none; stroke:rgba(240,237,232,.32); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .d { fill:none; stroke:rgba(240,112,32,.42); stroke-width:1.4; stroke-dasharray:6 6; }
    .n { fill:#f5a623; stroke:none; }
    .draw { stroke-dasharray:1; stroke-dashoffset:1; animation:dr 1.4s ease forwards; }
    .fade { opacity:0; animation:fd .7s ease forwards; }
    @keyframes dr { to { stroke-dashoffset:0; } }
    @keyframes fd { to { opacity:1; } }
    @media (prefers-reduced-motion: reduce) {
      .draw { animation:none; stroke-dashoffset:0; }
      .fade { animation:none; opacity:1; }
    }
  </style>

  <!-- кровельное покрытие со свесами (контур крыши) -->
  <polyline class="l draw" points="72,300 310,80 548,300" pathLength="1" style="animation-delay:.15s"/>
  <!-- стропила (верхний пояс) -->
  <line class="l draw" x1="90" y1="310" x2="310" y2="95" pathLength="1" style="animation-delay:.35s"/>
  <line class="l draw" x1="530" y1="310" x2="310" y2="95" pathLength="1" style="animation-delay:.35s"/>

  <!-- затяжка (нижний пояс) -->
  <line class="f draw" x1="90" y1="310" x2="530" y2="310" pathLength="1" style="animation-delay:0s"/>
  <!-- бабка (king post) -->
  <line class="f draw" x1="310" y1="95" x2="310" y2="310" pathLength="1" style="animation-delay:.55s"/>
  <!-- подкосы -->
  <line class="f draw" x1="310" y1="215" x2="200" y2="202.5" pathLength="1" style="animation-delay:.7s"/>
  <line class="f draw" x1="310" y1="215" x2="420" y2="202.5" pathLength="1" style="animation-delay:.7s"/>

  <!-- размерная линия пролёта -->
  <g class="fade" style="animation-delay:1.1s">
    <line class="d" x1="90" y1="352" x2="530" y2="352"/>
    <line class="d" x1="90" y1="318" x2="90" y2="360"/>
    <line class="d" x1="530" y1="318" x2="530" y2="360"/>
    <path class="d" d="M84 358 L96 346 M524 358 L536 346" style="stroke-dasharray:none"/>
  </g>

  <!-- узлы -->
  <g class="fade" style="animation-delay:1.25s">
    <circle class="n" cx="310" cy="95" r="3.6"/>
    <circle class="n" cx="90" cy="310" r="3.6"/>
    <circle class="n" cx="530" cy="310" r="3.6"/>
    <circle class="n" cx="310" cy="310" r="3.2"/>
    <circle class="n" cx="200" cy="202.5" r="3.2"/>
    <circle class="n" cx="420" cy="202.5" r="3.2"/>
  </g>
</svg>
