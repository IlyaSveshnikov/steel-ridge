<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 460" width="660" height="460" fill="none" role="img" aria-label="Детальный чертёж стропильной фермы крыши">
  <style>
    .l { fill:none; stroke:#f07020; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; }
    .f { fill:none; stroke:rgba(240,237,232,.34); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
    .t { fill:none; stroke:rgba(240,237,232,.3); stroke-width:1.3; stroke-linecap:round; }
    .d { fill:none; stroke:rgba(240,112,32,.4); stroke-width:1.3; stroke-dasharray:6 5; }
    .a { fill:none; stroke:rgba(245,166,35,.7); stroke-width:1.4; }
    .n { fill:#f5a623; stroke:none; }
    .draw { stroke-dasharray:1; stroke-dashoffset:1; animation:dr 1.4s ease forwards; }
    .fade { opacity:0; animation:fd .7s ease forwards; }
    @keyframes dr { to { stroke-dashoffset:0; } }
    @keyframes fd { to { opacity:1; } }
    @media (prefers-reduced-motion: reduce) {
      .draw { animation:none; stroke-dashoffset:0; }
      .fade { animation:none; opacity:1; }
    }
  </style>

  <!-- стены + мауэрлат -->
  <g class="f draw" style="animation-delay:.85s">
    <path d="M94 320 V352 M108 320 V352"/>
    <path d="M552 320 V352 M566 320 V352"/>
  </g>

  <!-- кровельное покрытие со свесами (контур крыши) -->
  <polyline class="l draw" points="78,312 330,88 582,312" pathLength="1" style="animation-delay:.35s"/>
  <!-- стропила (верхний пояс) -->
  <line class="l draw" x1="100" y1="320" x2="330" y2="110" pathLength="1" style="animation-delay:.2s"/>
  <line class="l draw" x1="560" y1="320" x2="330" y2="110" pathLength="1" style="animation-delay:.2s"/>
  <!-- конёк -->
  <line class="l draw" x1="318" y1="99" x2="342" y2="99" pathLength="1" style="animation-delay:.5s"/>

  <!-- затяжка (нижний пояс) -->
  <line class="f draw" x1="100" y1="320" x2="560" y2="320" pathLength="1" style="animation-delay:0s"/>
  <!-- бабка (king post) -->
  <line class="f draw" x1="330" y1="110" x2="330" y2="320" pathLength="1" style="animation-delay:.5s"/>
  <!-- подвески (queen posts) -->
  <line class="f draw" x1="215" y1="215" x2="215" y2="320" pathLength="1" style="animation-delay:.6s"/>
  <line class="f draw" x1="445" y1="215" x2="445" y2="320" pathLength="1" style="animation-delay:.6s"/>
  <!-- подкосы -->
  <line class="f draw" x1="330" y1="320" x2="215" y2="215" pathLength="1" style="animation-delay:.72s"/>
  <line class="f draw" x1="330" y1="320" x2="445" y2="215" pathLength="1" style="animation-delay:.72s"/>

  <!-- обрешётка (батенсы) на скатах -->
  <g class="t fade" style="animation-delay:1s">
    <line x1="149.6" y1="240.3" x2="157.6" y2="249.3"/>
    <line x1="200"   y1="195.5" x2="208"   y2="204.5"/>
    <line x1="250.4" y1="150.7" x2="258.4" y2="159.7"/>
    <line x1="510.4" y1="240.3" x2="502.4" y2="249.3"/>
    <line x1="460"   y1="195.5" x2="452"   y2="204.5"/>
    <line x1="409.6" y1="150.7" x2="401.6" y2="159.7"/>
  </g>

  <!-- отметка угла ската -->
  <g class="a fade" style="animation-delay:1.1s">
    <path d="M144 320 A44 44 0 0 0 132.5 290.3"/>
  </g>

  <!-- размеры: пролёт и высота -->
  <g class="d fade" style="animation-delay:1.15s">
    <!-- пролёт -->
    <line x1="100" y1="372" x2="560" y2="372"/>
    <line x1="100" y1="356" x2="100" y2="380"/>
    <line x1="560" y1="356" x2="560" y2="380"/>
    <path d="M94 378 L106 366 M554 378 L566 366" style="stroke-dasharray:none"/>
    <!-- высота -->
    <line x1="610" y1="110" x2="610" y2="320"/>
    <line x1="330" y1="110" x2="616" y2="110"/>
    <line x1="560" y1="320" x2="616" y2="320"/>
    <path d="M604 116 L616 104 M604 326 L616 314" style="stroke-dasharray:none"/>
  </g>

  <!-- узлы -->
  <g class="fade" style="animation-delay:1.3s">
    <circle class="n" cx="330" cy="110" r="3.6"/>
    <circle class="n" cx="100" cy="320" r="3.6"/>
    <circle class="n" cx="560" cy="320" r="3.6"/>
    <circle class="n" cx="330" cy="320" r="3.2"/>
    <circle class="n" cx="215" cy="215" r="3"/>
    <circle class="n" cx="445" cy="215" r="3"/>
    <circle class="n" cx="215" cy="320" r="3"/>
    <circle class="n" cx="445" cy="320" r="3"/>
  </g>
</svg>
